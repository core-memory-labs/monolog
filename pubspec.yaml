name: monolog
description: Private notebook — local-first note-taking app organized by topics.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_riverpod: ^2.6.1
  url_launcher: ^6.2.0
  share_plus: ^7.0.0
  image_picker: ^1.1.0
  receive_sharing_intent: ^1.8.1
  file_picker: ^8.1.0
  open_filex: ^4.5.0
  http: ^1.2.0
  html: ^0.15.5
  sqflite_common_ffi: ^2.3.0
  sqlite3_flutter_libs: ^0.5.0
  archive: ^4.0.2
  shared_preferences: ^2.3.0
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
